name: Dependency Updates

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  dependency-updates:
    name: Create Dependency Update PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
    steps:
    - name: Check out code
      uses: actions/checkout@v6
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Install jq
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Check for outdated Go modules
      id: outdated
      run: |
        echo "🔍 Checking for outdated Go modules..."
        
        go list -m -json all | jq -r 'select(.Indirect != true and .Update.Version != null) | "\(.Path)@\(.Update.Version)"' > updates.txt || echo "No updates available"
        
        echo "📋 Updates found:"
        cat updates.txt || echo "No updates found"
        echo ""
        
        if [ -s updates.txt ]; then
          echo "outdated=true" >> $GITHUB_OUTPUT
          echo "Found $(wc -l < updates.txt) outdated packages:"
          cat updates.txt
        else
          echo "outdated=false" >> $GITHUB_OUTPUT
          echo "✅ All dependencies are up to date!"
        fi

    - name: Create update PR
      if: steps.outdated.outputs.outdated == 'true'
      run: |
        echo "🔄 Creating pull request..."
        
        # Create branch for updates
        BRANCH="dependency-updates-$(date +%Y%m%d-%H%M%S)"
        echo "🌿 Creating branch: $BRANCH"
        git checkout -b $BRANCH || {
          echo "❌ Failed to create branch"
          exit 1
        }
        
        # Update dependencies
        echo "📦 Updating dependencies..."
        go get -u ./...
        go mod tidy
        
        # Run tests
        echo "🧪 Running tests..."
        go test ./... || {
          echo "❌ Tests failed after dependency updates"
          exit 1
        }
        
        # Commit changes
        echo "📝 Committing changes..."
        git add go.mod go.sum
        git commit -m "chore: update dependencies
        
        - Updated Go modules to latest versions
        - All tests pass after updates"
        
        # Push branch
        echo "📤 Pushing branch..."
        git push origin $BRANCH || {
          echo "❌ Failed to push branch"
          exit 1
        }
        
        # Create PR with simple body
        echo "🔄 Creating pull request..."
        PR_TITLE="📦 Automated Dependency Updates"
        
        gh pr create \
          --title "$PR_TITLE" \
          --body "Automated dependency updates found. Please review the changes in go.mod and go.sum files." \
          --base master \
          --head $BRANCH || {
          echo "❌ PR creation failed, creating issue instead..."
          
          # Alternative: Create issue instead of PR
          ISSUE_TITLE="📦 Automated Dependency Updates Available"
          
          gh issue create \
            --title "$ISSUE_TITLE" \
            --body "Automated dependency updates are available. Please review and create a PR manually." || {
              echo "❌ Issue creation also failed"
              exit 1
            }
        }
        
        echo "✅ Dependency update process completed!"
        echo "🔗 Created PR or Issue: https://github.com/Build-with-Go/go-starter/pulls"
        
        echo "📊 Summary:"
        echo "- Branch: $BRANCH"
        echo "- Updated packages: $(wc -l < updates.txt)"
        echo "- All tests passed"
        echo "- Ready for review"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create summary
      run: |
        echo "## 📦 Dependency Update Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ "${{ steps.outdated.outputs.outdated }}" == "true" ]; then
          echo "✅ **Updates Available**: $(wc -l < updates.txt) packages" >> $GITHUB_STEP_SUMMARY
          echo "🔄 **Action**: Created PR with dependency updates" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Updated Packages:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat updates.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
        else
          echo "✅ **Status**: All dependencies are up to date" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Action**: No updates needed" >> $GITHUB_STEP_SUMMARY
        fi
