name: Go Report Card

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  goreportcard:
    name: Go Report Card
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'

    - name: Run Go Report Card
      run: |
        # Install goreportcard
        go install github.com/gojp/goreportcard/cmd/goreportcard@latest
        
        # Run goreportcard on the current directory
        goreportcard .
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
