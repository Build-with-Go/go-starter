name: Go Report Card

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'

jobs:
  goreportcard:
    name: Go Report Card
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22'

    - name: Run Go Report Card
      run: |
        # Install goreportcard using the correct method
        go install github.com/gojp/goreportcard/cmd/goreportcard@latest || \
        go run github.com/gojp/goreportcard/cmd/goreportcard@latest . || \
        curl -sfL https://goreportcard.com/checks | sh
        
        # Try to run goreportcard if installation succeeded
        if command -v goreportcard &> /dev/null; then
          goreportcard .
        else
          echo "⚠️ goreportcard installation failed, skipping analysis"
          echo "📊 Running basic Go checks instead..."
          
          # Run basic Go quality checks
          echo "🔍 Running go fmt..."
          go fmt ./...
          
          echo "🔍 Running go vet..."
          go vet ./...
          
          echo "🔍 Running tests..."
          go test ./...
          
          echo "✅ Basic Go quality checks completed"
        fi
