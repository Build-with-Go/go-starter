# Test workflow to trigger Dependabot GitHub Actions updates
name: Test Dependabot

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3  # Intentionally using older version for Dependabot test
      
    - name: Setup Go
      uses: actions/setup-go@v4  # Using current version to test
      with:
        go-version: '1.21'
        cache: 'true'
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4  # Current version to avoid auto-failure
      with:
        name: test-artifact
        path: README.md
        retention-days: 1
        
    - name: Cache Go modules
      uses: actions/cache@v5  # Intentionally using older version for Dependabot test
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
        
    - name: Run Go test
      run: |
        echo "Testing Dependabot trigger"
        go version
        echo "Go project test completed"
