name: Doctor Bot - Repository Scanner

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  doctor-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.21'
        
    - name: Install Go tools
      run: |
        go install golang.org/x/tools/cmd/goimports@latest
        go install honnef.co/go/tools/cmd/staticcheck@latest
        go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
        
    - name: Create scan results directory
      run: mkdir -p scan-results
      
    - name: Scan for syntax errors
      id: syntax-scan
      run: |
        echo "🔍 Scanning for syntax errors..."
        syntax_errors=()
        
        # Check Go files for syntax errors
        for file in $(find . -name "*.go" -type f); do
          if ! go fmt "$file" > /dev/null 2>&1; then
            syntax_errors+=("Syntax error in $file")
            echo "❌ Syntax error found in $file" >> scan-results/syntax-errors.log
          fi
        done
        
        # Check YAML files for syntax errors
        for file in $(find . -name "*.yml" -o -name "*.yaml" -type f); do
          if ! python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
            syntax_errors+=("YAML syntax error in $file")
            echo "❌ YAML syntax error in $file" >> scan-results/syntax-errors.log
          fi
        done
        
        if [ ${#syntax_errors[@]} -gt 0 ]; then
          echo "has_syntax_errors=true" >> $GITHUB_OUTPUT
        else
          echo "has_syntax_errors=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Scan for formatting issues
      id: format-scan
      run: |
        echo "📝 Scanning for formatting issues..."
        format_issues=()
        
        # Check Go file formatting
        unformatted_files=$(gofmt -l . 2>/dev/null || true)
        if [ -n "$unformatted_files" ]; then
          for file in $unformatted_files; do
            format_issues+=("Go formatting issue in $file")
            echo "❌ Go formatting needed: $file" >> scan-results/format-issues.log
          done
        fi
        
        if [ ${#format_issues[@]} -gt 0 ]; then
          echo "has_format_issues=true" >> $GITHUB_OUTPUT
        else
          echo "has_format_issues=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Scan for code quality issues
      id: quality-scan
      run: |
        echo "🔍 Scanning for code quality issues..."
        
        # Run staticcheck
        # if ! staticcheck ./... > scan-results/staticcheck.log 2>&1; then
        #   echo "❌ Staticcheck issues found" >> scan-results/quality-issues.log
        #   cat scan-results/staticcheck.log >> scan-results/quality-issues.log
        # fi
        
        # Run golangci-lint (temporarily disabled due to CI failures)
        # if ! golangci-lint run > scan-results/golangci-lint.log 2>&1; then
        #   echo "❌ Golangci-lint issues found" >> scan-results/quality-issues.log
        #   cat scan-results/golangci-lint.log >> scan-results/quality-issues.log
        # fi
        
        # Check for TODO/FIXME comments
        todo_files=$(grep -r "TODO\|FIXME\|XXX\|HACK" --include="*.go" --include="*.yml" --include="*.yaml" . || true)
        if [ -n "$todo_files" ]; then
          echo "$todo_files" > scan-results/todo-comments.log
          echo "❌ TODO/FIXME comments found" >> scan-results/quality-issues.log
        fi
        
        if [ -f scan-results/quality-issues.log ]; then
          echo "has_quality_issues=true" >> $GITHUB_OUTPUT
        else
          echo "has_quality_issues=false" >> $GITHUB_OUTPUT
        fi
        
    # Scan for security issues (temporarily disabled due to CI failures)
    # - name: Scan for security issues
    #   id: security-scan
    #   run: |
    #     echo "🔒 Scanning for security issues..."
    #     
    #     # Check for hardcoded secrets
    #     secret_patterns=("password" "secret" "token" "api_key" "private_key" "credential")
    #     
    #     for pattern in "${secret_patterns[@]}"; do
    #       found=$(grep -r -i "$pattern" --include="*.go" --include="*.yml" --include="*.yaml" --include="*.json" . | grep -v "test\|example\|sample\|secrets\.\|secret_patterns\|GITHUB_TOKEN\|DOCKER_" || true)
    #       if [ -n "$found" ]; then
    #         echo "⚠️ Potential hardcoded $pattern found:" >> scan-results/security-issues.log
    #         echo "$found" >> scan-results/security-issues.log
    #         echo "" >> scan-results/security-issues.log
    #       fi
    #     done
    #     
    #     if [ -f scan-results/security-issues.log ]; then
    #       echo "has_security_issues=true" >> $GITHUB_OUTPUT
    #     else
    #       echo "has_security_issues=false" >> $GITHUB_OUTPUT
    #     fi
        
    - name: Scan for documentation issues
      id: docs-scan
      run: |
        echo "📚 Scanning for documentation issues..."
        
        # Check for missing package documentation
        packages=$(go list ./...)
        for pkg in $packages; do
          pkg_dir=${pkg#github.com/Build-with-Go/go-starter}
          if [ -d "$pkg_dir" ]; then
            go_files=$(find "$pkg_dir" -name "*.go" -not -name "*_test.go" | head -1)
            if [ -n "$go_files" ]; then
              if ! grep -q "Package $(basename $pkg)" "$go_files" 2>/dev/null; then
                echo "❌ Missing package documentation for $pkg" >> scan-results/docs-issues.log
              fi
            fi
          fi
        done
        
        if [ -f scan-results/docs-issues.log ]; then
          echo "has_docs_issues=true" >> $GITHUB_OUTPUT
        else
          echo "has_docs_issues=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Create issues for found problems
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Helper function to create issue
          async function createIssue(title, body, labels) {
            try {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: labels
              });
              console.log(`Created issue: ${title}`);
            } catch (error) {
              console.error(`Error creating issue ${title}:`, error);
            }
          }
          
          // Read scan results
          const scanDir = 'scan-results';
          
          // Check for syntax errors
          if (fs.existsSync(path.join(scanDir, 'syntax-errors.log'))) {
            const content = fs.readFileSync(path.join(scanDir, 'syntax-errors.log'), 'utf8');
            if (content.trim() !== '') {
              await createIssue(
                '🚨 Syntax Errors Detected',
                '## 🚨 Syntax Errors Found\n\nThe Doctor Bot detected syntax errors in the codebase:\n\n```\n' + content + '\n```\n\n### 🔧 How to Fix\n1. Fix the syntax errors in the identified files\n2. Test the fixes locally with `go build`\n3. Commit the fixes\n4. The Doctor Bot will verify the fixes on the next scan\n\n---\n🤖 *This issue was automatically created by the Doctor Bot*\n📅 *Scan date: ' + new Date().toISOString() + '*',
                ['bug', 'syntax', 'doctor-bot']
              );
            }
          }
          
          // Check for format issues
          if (fs.existsSync(path.join(scanDir, 'format-issues.log'))) {
            const content = fs.readFileSync(path.join(scanDir, 'format-issues.log'), 'utf8');
            if (content.trim() !== '') {
              await createIssue(
                '📝 Code Formatting Issues',
                '## 📝 Code Formatting Issues Found\n\nThe Doctor Bot detected formatting issues in the codebase:\n\n```\n' + content + '\n```\n\n### 🔧 How to Fix\n1. Run `go fmt ./...` to fix Go formatting\n2. Run `goimports -w .` to organize imports\n3. Commit the formatting fixes\n4. The Doctor Bot will verify the fixes on the next scan\n\n---\n🤖 *This issue was automatically created by the Doctor Bot*\n📅 *Scan date: ' + new Date().toISOString() + '*',
                ['enhancement', 'formatting', 'doctor-bot']
              );
            }
          }
          
          // Check for quality issues
          if (fs.existsSync(path.join(scanDir, 'quality-issues.log'))) {
            const content = fs.readFileSync(path.join(scanDir, 'quality-issues.log'), 'utf8');
            if (content.trim() !== '') {
              await createIssue(
                '🔍 Code Quality Issues',
                '## 🔍 Code Quality Issues Found\n\nThe Doctor Bot detected code quality issues:\n\n```\n' + content + '\n```\n\n### 🔧 How to Fix\n1. Address the staticcheck and golangci-lint warnings\n2. Remove or address TODO/FIXME comments\n3. Run tests to ensure fixes do not break functionality\n4. Commit the improvements\n5. The Doctor Bot will verify the fixes on the next scan\n\n---\n🤖 *This issue was automatically created by the Doctor Bot*\n📅 *Scan date: ' + new Date().toISOString() + '*',
                ['enhancement', 'quality', 'doctor-bot']
              );
            }
          }
          
          // Check for security issues
          if (fs.existsSync(path.join(scanDir, 'security-issues.log'))) {
            const content = fs.readFileSync(path.join(scanDir, 'security-issues.log'), 'utf8');
            if (content.trim() !== '') {
              await createIssue(
                '🔒 Security Issues Detected',
                '## 🔒 Security Issues Found\n\nThe Doctor Bot detected potential security issues:\n\n```\n' + content + '\n```\n\n### 🔧 How to Fix\n1. Remove hardcoded secrets and use environment variables\n2. Review and fix the security concerns\n3. Test the security fixes\n4. Commit the security improvements\n5. The Doctor Bot will verify the fixes on the next scan\n\n⚠️ **Priority**: Address these issues promptly as they affect security.\n\n---\n🤖 *This issue was automatically created by the Doctor Bot*\n📅 *Scan date: ' + new Date().toISOString() + '*',
                ['security', 'doctor-bot']
              );
            }
          }
          
          // Check for docs issues
          if (fs.existsSync(path.join(scanDir, 'docs-issues.log'))) {
            const content = fs.readFileSync(path.join(scanDir, 'docs-issues.log'), 'utf8');
            if (content.trim() !== '') {
              await createIssue(
                '📚 Documentation Issues',
                '## 📚 Documentation Issues Found\n\nThe Doctor Bot detected documentation issues:\n\n```\n' + content + '\n```\n\n### 🔧 How to Fix\n1. Add package documentation following Go conventions\n2. Update outdated documentation\n3. Review and improve code comments\n4. Commit the documentation improvements\n5. The Doctor Bot will verify the fixes on the next scan\n\n---\n🤖 *This issue was automatically created by the Doctor Bot*\n📅 *Scan date: ' + new Date().toISOString() + '*',
                ['documentation', 'enhancement', 'doctor-bot']
              );
            }
          }

    - name: Upload scan artifacts
      uses: actions/upload-artifact@v4
      with:
        name: doctor-bot-scan-results
        path: scan-results/
        retention-days: 30
