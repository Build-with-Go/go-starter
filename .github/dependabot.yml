version: 2
updates:
  # Go modules
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 3
    reviewers:
      - "build-with-go/maintainers"
    assignees:
      - "build-with-go/maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group updates to reduce PR count
    groups:
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "version-update:semver-patch"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 2
    reviewers:
      - "build-with-go/maintainers"
    assignees:
      - "build-with-go/maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
    # Group minor updates together
    groups:
      github-actions:
        patterns:
          - "github.com/actions/*"
        update-types:
          - "version-update:semver-patch"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 1
    reviewers:
      - "build-with-go/maintainers"
    assignees:
      - "build-with-go/maintainers"
    commit-message:
      prefix: "chore"
      include: "scope"
